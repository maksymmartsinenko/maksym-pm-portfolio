<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поряд — шлях користувача</title>
<meta name="description" content="Діаграма шляху користувача застосунку «Поряд»: від каналу входу до читання з безшовним перемиканням мов.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#FAF7F2;--ink:#1C1A17;--accent:#2B4C7E;--line:#E7E0D6;--muted:#6B655C;--maxw:880px}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2{font-family:"Lora",Georgia,"Times New Roman",serif;line-height:1.2;letter-spacing:-0.01em;font-weight:600}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-left:22px;padding-right:22px}
  .site-head{background:var(--paper);border-bottom:1px solid var(--line)}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-family:"Lora",Georgia,serif;font-weight:700;font-size:21px;color:var(--ink)}
  .logo svg{display:block}
  .back{color:var(--muted);font-size:15px;font-weight:600}
  main{padding:42px 0 10px}
  h1{font-size:clamp(26px,5.4vw,38px);margin:0 0 .4em;text-align:center}
  .lead{font-size:16.5px;color:var(--muted);text-align:center;max-width:640px;margin:0 auto 8px}
  figure{margin:26px 0 0;border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;overflow:auto}
  figure img{width:100%;height:auto;display:block;min-width:600px}
  .cap{font-size:14px;color:var(--muted);margin-top:10px;text-align:center}
  footer{padding:30px 0 24px;color:var(--muted);font-size:13.5px;text-align:center;border-top:1px solid var(--line);margin-top:34px}
</style>
</head>
<body>

<header class="site-head">
  <div class="wrap">
    <div class="topbar">
      <a class="logo" href="../" aria-label="Поряд — на головну">
        <svg width="34" height="30" viewBox="0 0 34 30" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
          <path d="M17 5 C12 2.5 5 2.5 2 4 L2 25 C5 23.5 12 23.5 17 26 Z" fill="#2B4C7E" fill-opacity="0.16" stroke="#2B4C7E" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M17 5 C22 2.5 29 2.5 32 4 L32 25 C29 23.5 22 23.5 17 26 Z" fill="#2B4C7E" fill-opacity="0.16" stroke="#2B4C7E" stroke-width="1.6" stroke-linejoin="round"/>
          <line x1="17" y1="5" x2="17" y2="26" stroke="#2B4C7E" stroke-width="1.6"/>
        </svg>
        Поряд
      </a>
      <a class="back" href="../">← На головну</a>
    </div>
  </div>
</header>

<main class="wrap">
  <h1>Шлях користувача</h1>
  <p class="lead">Шлях користувача від каналу входу до читання: полиця-хаб, неперервне читання з безшовним перемиканням режимів, trial із доступом одразу.</p>
  <figure>
    <img src="../user-flow.svg" alt="Шлях користувача застосунку «Поряд»: канали входу → полиця-хаб → читання з перемиканням перекладів → апгрейд через trial">
    <figcaption class="cap">Повна діаграма: <a href="../user-flow.svg" target="_blank" rel="noopener">відкрити user-flow.svg</a></figcaption>
  </figure>
</main>

<footer class="wrap">
  «Поряд» · poryad.app · читай в оригіналі, дочитуй українською
</footer>

</body>
</html>
